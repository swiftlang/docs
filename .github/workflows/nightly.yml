name: Nightly build and deploy

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    if: github.repository == 'heckj/docs'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    container:
      image: swift:6.3
    steps:
      - uses: actions/checkout@v7

      - uses: actions/cache@v5
        with:
          path: .workspace
          key: docs-workspace-${{ hashFiles('scripts/sources.json') }}
          restore-keys: |
            docs-workspace-

      - name: Install Python
        run: apt-get update && apt-get install -y python3

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build documentation
        run: python3 scripts/build_docs.py --output-dir "$GITHUB_WORKSPACE/build-output" --extra-hosting-prefix docs

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'build-output'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
